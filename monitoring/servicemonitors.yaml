# ===========================
# GKE Managed Prometheus PodMonitoring
# Updated for V3 Pipeline
# ===========================

# Elasticsearch PodMonitoring
---
apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: elasticsearch
  namespace: elastic
spec:
  selector:
    matchLabels:
      app.stateful/component: elasticsearch
      elasticsearch.k8s.elastic.co/cluster-name: elasticsearch-ha
  endpoints:
  - port: 9114
    interval: 30s
    path: /metrics

# ===========================
# Fraud Detection Services
# ===========================

# 1. Router PodMonitoring
---
apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: anomaly-router-monitoring
  namespace: elastic
  labels:
    app: anomaly-router
    tier: routing
spec:
  selector:
    matchLabels:
      app: anomaly-router
  endpoints:
  - port: http  # Named port from service definition
    interval: 30s
    path: /metrics
    # V3 metrics to collect:
    # - router_requests_total
    # - percolate_query_latency_seconds
    # - fallback_strategy_used_total
    # - partial_match_score_distribution

