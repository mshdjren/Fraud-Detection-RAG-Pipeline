# 5. Locust PodMonitoring (optional - for load testing metrics)
---
apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: locust-monitoring
  namespace: elastic
  labels:
    app: locust
    tier: testing
spec:
  selector:
    matchLabels:
      app: locust
      role: master
  endpoints:
  - port: 8089
    interval: 30s
    path: /stats/requests  # Locust stats endpoint
    # Locust metrics:
    # - locust_users
    # - locust_requests
    # - locust_failures
    # - locust_response_time_percentiles

# ===========================
# ClusterPodMonitoring (cross-namespace)
# ===========================

# For monitoring pods across all namespaces
---
apiVersion: monitoring.googleapis.com/v1
kind: ClusterPodMonitoring
metadata:
  name: anomaly-detection-cluster-monitoring
spec:
  selector:
    matchLabels:
      tier: fraud-detection
  endpoints:
  - port: http
    interval: 30s
    path: /metrics

# ===========================
# Deployment Instructions
# ===========================
#
# Apply all PodMonitoring resources:
# kubectl apply -f servicemonitors-v3.yaml
#
# Verify deployment:
# kubectl get podmonitoring -n elastic
# kubectl describe podmonitoring anomaly-orchestrator-monitoring -n elastic
#
# Check metrics collection:
# kubectl port-forward -n elastic svc/anomaly-orchestrator 8080:80 &
# curl http://localhost:8080/metrics
#
# Query in Cloud Monitoring (Prometheus):
# # V3 metrics
# pipeline_requests_total{case="case1"}
# case_override_used_total
# embedding_override_used_total
# validation_errors_total
#
# # Performance by case
# histogram_quantile(0.95, 
#   sum by (le, case) (rate(pipeline_latency_seconds_bucket[5m]))
# )
#
# # Cache performance
# sum(rate(cache_hits_total[5m])) 
# / 
# (sum(rate(cache_hits_total[5m])) + sum(rate(cache_misses_total[5m])))
#
# Troubleshooting:
# # Check if metrics are being scraped
# kubectl logs -n gmp-system -l app.kubernetes.io/name=collector
#
# # Verify PodMonitoring targets
# kubectl get podmonitoring -n elastic -o yaml
#
# # Test metrics endpoint manually
# kubectl exec -it <pod-name> -n elastic -- curl localhost:8080/metrics
#
# Notes:
# - Interval: 30s (default for GKE Managed Prometheus)
# - Port: Use named port "http" from service definition
# - Path: /metrics (Prometheus standard)
# - Labels: Added tier labels for better organization
# - V3 metrics are automatically collected from /metrics endpoint
# - Recording rules in prometheus-rules-v3.yaml optimize dashboard queries
# - Cloud Monitoring retention: 24 months for Prometheus metrics
