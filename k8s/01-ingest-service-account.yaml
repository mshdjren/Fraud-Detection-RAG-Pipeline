apiVersion: v1
kind: ServiceAccount
metadata:
  name: ingest-sa
  namespace: elastic
  annotations:
    # Workload Identity: KSA(ingest-sa) -> GSA 매핑
    iam.gke.io/gcp-service-account: elasticsearch-ingest@<PROJECT_ID>.iam.gserviceaccount.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ingest-run-jobs
  namespace: elastic
rules:
  # (선택) Job 생성/조회 권한: 튜토리얼 패턴 호환
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # (선택) 디버깅 편의: 파드/로그 조회
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ingest-run-jobs-binding
  namespace: elastic
subjects:
  - kind: ServiceAccount
    name: ingest-sa
    namespace: elastic
roleRef:
  kind: Role
  name: ingest-run-jobs
  apiGroup: rbac.authorization.k8s.io
