# ===========================
# Streamlit UI ConfigMap
# ===========================

apiVersion: v1
kind: ConfigMap
metadata:
  name: streamlit-config
  namespace: elastic
  labels:
    app: fraud-detection-ui
data:
  ORCHESTRATOR_URL: "http://anomaly-orchestrator:80"
  EXPERIMENT_CASE:  "pca_64_k100"
  ADAPTER_TYPE:     "mined"

---
# ===========================
# ServiceAccount
# ===========================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: fraud-detection-ui
  namespace: elastic
  labels:
    app: fraud-detection-ui

---
# ===========================
# Deployment
# ===========================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-ui
  namespace: elastic
  labels:
    app: fraud-detection-ui
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fraud-detection-ui
  template:
    metadata:
      labels:
        app: fraud-detection-ui
        tier: frontend
    spec:
      serviceAccountName: fraud-detection-ui
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role
                operator: In
                values: ["batch-node"]
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: fraud-detection-ui
              topologyKey: kubernetes.io/hostname

      containers:
      - name: streamlit
        image: us-central1-docker.pkg.dev/project-fcd52ffc-8b8b-4557-858/elasticsearch-images/fraud-detection-ui:1.0
        imagePullPolicy: Always

        ports:
        - containerPort: 8501
          name: http
          protocol: TCP

        # ConfigMap 전체를 envFrom으로 한번에 주입
        envFrom:
        - configMapRef:
            name: streamlit-config

        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 20
          periodSeconds: 15

        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 10

        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        volumeMounts:
        - name: code-volume
          mountPath: /app/streamlit.py
          subPath: streamlit.py

      volumes:
      - name: code-volume
        configMap:
          name: streamlit-code

---
# ===========================
# Service (LoadBalancer)
# ===========================

apiVersion: v1
kind: Service
metadata:
  name: fraud-detection-ui
  namespace: elastic
  labels:
    app: fraud-detection-ui
    tier: frontend
spec:
  type: LoadBalancer
  selector:
    app: fraud-detection-ui
    tier: frontend
  ports:
  - name: http
    port: 80
    targetPort: 8501
    protocol: TCP

# ===========================
# 배포 절차
# ===========================
#
# 1. 코드 ConfigMap 생성:
#    kubectl create configmap streamlit-code \
#      --from-file=streamlit_app.py=apps/streamlit_app.py \
#      -n elastic --dry-run=client -o yaml | kubectl apply -f -
#
# 2. Deployment 적용:
#    kubectl apply -f 07-streamlit.yaml
#
# 3. 외부 IP 확인:
#    kubectl get svc fraud-detection-ui -n elastic
#    → EXTERNAL-IP 할당 후 http://<EXTERNAL-IP> 접속
#
# ===========================
# orchestrator URL 변경 시
# ===========================
#
#    kubectl patch configmap streamlit-config -n elastic \
#      --type merge -p '{"data":{"ORCHESTRATOR_URL":"http://anomaly-orchestrator:80"}}'
#    kubectl rollout restart deployment/fraud-detection-ui -n elastic