# ===========================
# retriever-code ConfigMap 생성
# ===========================
#
# coreset_sampler.py 의존성 제거 → retriever.py만 등록
#
# kubectl create configmap retriever-code \
#   --from-file=retriever.py=apps/retriever.py \
#   -n elastic --dry-run=client -o yaml | kubectl apply -f -
#
# ===========================
# 테스트
# ===========================
#
# kubectl port-forward -n elastic svc/anomaly-retriever 8001:80
#
# ★ v5: 엔드포인트 /search → /retrieve 변경
# curl -X POST http://localhost:8001/retrieve \
#   -H "Content-Type: application/json" \
#   -d '{
#     "embedding":   [0.12, -0.45, ...576개...],
#     "cluster_ids": [42, 128, 203, 310, 89],
#     "vec_index":   "fraud_ecom_percentage_100_cluster_tree_vec",
#     "top_k": 5
#   }'
#
# Response 필드 (RetrieveResponse):
#   results[*]: {es_doc_id, original_index, cluster_id, distance, score}
#   top1_distance, latency_ms, search_mode, page_fault_delta, skip_analyzer
#
# ★ v5.1: Batch 엔드포인트 추가 (batch_inference.py 전용)
# curl -X POST http://localhost:8001/retrieve-batch \
#   -H "Content-Type: application/json" \
#   -d '[
#     {"embedding": [...], "cluster_ids": [42, 128], "vec_index": "...", "top_k": 5},
#     {"embedding": [...], "cluster_ids": [7,  203], "vec_index": "...", "top_k": 5}
#   ]'